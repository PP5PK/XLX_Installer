#!/usr/sbin/nft -f
# When making any changes, run the following command to apply them:
# sudo nft -f /etc/nftables.conf
# And to verify that the rule was applied correctly:
# sudo nft list 

# Clears all existing rules.
flush ruleset

# Create a table for IPv4 and IPv6
table inet filter {
    # Chain for inbound traffic
    chain input {
        type filter hook input priority filter; policy drop;

	# Block IPs
	ip saddr { 179.209.46.219, 172.237.152.151, 179.153.228.70 } log prefix "BLOCKED_IP: " drop

        # Accepts loopback traffic
        iif lo accept

        # Accepts established and related connections
        ct state established,related accept

        # Opens TCP ports
        tcp dport { 80, 443, 8080, 10023-10025, 17478, 20001-20005, 20010, 40001 } accept

        # Opens UDP ports
        udp dport { 3478, 4004, 8880, 10001, 10002, 10100-10199, 12345, 12346, 20001-20009, 21110, 30001-30007, 30051-30065, 40000, 42300, 42777, 62030 } accept

        # Reject everything else
        reject
    }

    # String for outbound traffic (allows everything by default)
    chain output {
        type filter hook output priority 0; policy accept;
    }

    # Chain for forwarding (blocks by default, if necessary)
    chain forward {
        type filter hook forward priority 0; policy drop;
    }
}
